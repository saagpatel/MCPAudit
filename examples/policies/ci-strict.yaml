# Strict CI gate for reviewed MCP server sets.
fail_on:
  permissions: medium
  injection: medium
  capabilities: medium
  config_health: medium
  drift: true
require:
  pins:
    servers:
      - github
      - filesystem-readonly
deny:
  permissions:
    - shell_execution
    - destructive
max_risk: 7
allow_servers:
  - github
  - filesystem-readonly
servers:
  filesystem-readonly:
    max_risk: 4
    deny:
      permissions:
        - file_write
