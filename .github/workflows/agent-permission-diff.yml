name: Agent Permission Diff

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: agent-permission-diff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  permission-diff:
    name: Agent-facing permission diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan agent-facing permission changes
        uses: saagpatel/agent-permission-diff-bot@20bc07d1f8052765d3a65378222a08869a7dd027 # v0.5.0
        with:
          mode: observe
          fail-on: critical
          json: agent-permission-diff.json
          sarif: agent-permission-diff.sarif
          markdown: agent-permission-diff.md
          step-summary: "true"
          comment: "true"
          upload-sarif: "false"
